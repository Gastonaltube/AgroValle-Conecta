<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgroValle Conecta — Tu feed</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Work+Sans:wght@400;500;600&family=Space+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --green-deep: #1E3A2B;
    --green-deep-2: #16301F;
    --green-sage: #6C8F53;
    --green-sage-light: #9BB984;
    --white: #FFFFFF;
    --paper: #F5F7F1;
    --ink: #1B2119;
    --ink-soft: #4B564A;
    --line: rgba(30,58,43,0.14);
    --shadow: 0 12px 32px rgba(20,40,28,0.10);
    --radius: 4px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Work Sans',sans-serif;
    font-size:16px;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,h4{
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;
    margin:0;
    color:var(--green-deep-2);
    letter-spacing:-0.02em;
  }
  .eyebrow{
    font-family:'Space Mono',monospace;
    font-size:11px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--green-sage);
    font-weight:500;
  }
  p{color:var(--ink-soft); margin:0;}
  a{color:inherit;}
  button{font-family:'Work Sans',sans-serif;}

  header.appbar{
    position:sticky; top:0; z-index:100;
    background:var(--white);
    border-bottom:1px solid var(--line);
    height:64px;
  }
  .appbar-inner{
    max-width:1200px; margin:0 auto; height:100%;
    padding:0 24px;
    display:flex; align-items:center; gap:20px;
  }
  .logo{
    display:flex; align-items:center; gap:9px;
    font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:17px;
    color:var(--green-deep-2); text-decoration:none; flex-shrink:0;
  }
  .logo-mark{width:24px; height:24px; flex-shrink:0;}

  .search-box{
    flex-grow:1; max-width:480px;
    display:flex; align-items:center; gap:8px;
    background:var(--paper); border:1px solid var(--line); border-radius:20px;
    padding:9px 16px;
  }
  .search-box input{
    border:none; background:transparent; outline:none; width:100%;
    font-family:'Work Sans',sans-serif; font-size:14px; color:var(--ink);
  }
  .search-box svg{flex-shrink:0; opacity:0.55;}

  .appbar-actions{
    display:flex; align-items:center; gap:6px; margin-left:auto;
  }
  .icon-btn{
    position:relative;
    width:42px; height:42px; border-radius:50%; border:none; background:transparent;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    color:var(--green-deep-2); transition:background .15s;
  }
  .icon-btn:hover{background:var(--paper);}
  .icon-btn .badge{
    position:absolute; top:5px; right:5px; width:8px; height:8px; border-radius:50%;
    background:#C25B3B; border:2px solid var(--white);
  }
  .profile-btn{
    display:flex; align-items:center; gap:9px; border:none; background:transparent;
    cursor:pointer; padding:6px 10px 6px 6px; border-radius:22px; transition:background .15s;
  }
  .profile-btn:hover{background:var(--paper);}
  .avatar{
    width:32px; height:32px; border-radius:50%; background:var(--green-sage);
    color:var(--white); display:flex; align-items:center; justify-content:center;
    font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:13px; flex-shrink:0;
  }
  .profile-btn .nombre{font-size:13.5px; font-weight:600; color:var(--green-deep-2); white-space:nowrap;}
  @media(max-width:760px){ .profile-btn .nombre{display:none;} .search-box{max-width:none;} }

  .dropdown-wrap{position:relative;}
  .dropdown-menu{
    position:absolute; top:52px; right:0; width:220px;
    background:var(--white); border:1px solid var(--line); border-radius:var(--radius);
    box-shadow:var(--shadow); padding:8px; display:none; z-index:110;
  }
  .dropdown-menu.open{display:block;}
  .dropdown-menu button{
    width:100%; text-align:left; background:none; border:none; padding:11px 12px;
    font-size:14px; color:var(--ink); border-radius:3px; cursor:pointer; display:flex; align-items:center; gap:10px;
  }
  .dropdown-menu button:hover{background:var(--paper);}
  .dropdown-menu .salir{color:#B03A2E;}
  .dropdown-menu hr{border:none; border-top:1px solid var(--line); margin:6px 0;}

  .app-layout{
    max-width:1200px; margin:0 auto; padding:28px 24px 80px;
    display:grid; grid-template-columns:1fr 300px; gap:28px; align-items:start;
  }
  @media(max-width:900px){ .app-layout{grid-template-columns:1fr; padding:20px 16px 60px;} .ads-aside{display:none;} }

  .feed-col{min-width:0;}
  .feed-toolbar{display:flex; justify-content:flex-end; margin-bottom:18px;}
  .feed-placeholder{
    background:var(--white); border:1px dashed var(--line); border-radius:var(--radius);
    padding:56px 32px; text-align:center;
  }
  .feed-placeholder .icon-wrap{
    width:52px; height:52px; border-radius:50%; background:var(--paper); margin:0 auto 18px;
    display:flex; align-items:center; justify-content:center;
  }
  .feed-placeholder h2{font-size:20px; margin-bottom:8px;}
  .feed-placeholder p{max-width:380px; margin:0 auto; font-size:14.5px;}

  .post-card{
    background:var(--white); border:1px solid var(--line); border-radius:var(--radius);
    margin-bottom:20px; overflow:hidden;
  }
  .post-img{width:100%; height:280px; object-fit:cover; display:block; background:var(--paper);}
  .post-body{padding:22px 24px;}
  .post-top{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:10px;}
  .post-cultivo{
    font-family:'Space Mono',monospace; font-size:11px; text-transform:uppercase; letter-spacing:0.06em;
    background:var(--paper); color:var(--green-deep-2); padding:5px 11px; border-radius:20px; font-weight:600;
  }
  .post-fecha{font-size:12.5px; color:var(--ink-soft); opacity:0.75;}
  .post-body h3{font-size:18px; margin-bottom:6px;}
  .post-detalle{font-size:14px; color:var(--ink-soft); margin-bottom:10px;}
  .post-detalle strong{color:var(--green-deep-2);}
  .post-desc{font-size:14px; margin-bottom:12px;}
  .post-finca{font-size:12.5px; color:var(--green-sage); font-weight:600;}

  .ads-aside{position:sticky; top:88px;}
  .ads-slot{
    background:var(--white); border:1px solid var(--line); border-radius:var(--radius);
    padding:20px; text-align:center; min-height:250px;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px;
  }
  .ads-slot .eyebrow{color:var(--ink-soft); opacity:0.7;}
  .ads-slot p{font-size:12.5px; max-width:200px;}

  .modal-overlay{
    display:none; position:fixed; inset:0; background:rgba(20,30,20,0.45);
    z-index:200; align-items:flex-start; justify-content:center; padding:60px 20px; overflow-y:auto;
  }
  .modal-overlay.open{display:flex;}
  .modal-card{
    background:var(--white); border-radius:var(--radius); max-width:560px; width:100%;
    padding:32px; box-shadow:var(--shadow); position:relative;
  }
  .modal-close{
    position:absolute; top:18px; right:18px; background:none; border:none; cursor:pointer;
    color:var(--ink-soft); width:32px; height:32px; border-radius:50%;
  }
  .modal-close:hover{background:var(--paper);}
  .form-card{margin-bottom:20px;}
  .field-group{margin-bottom:16px;}
  .field-group label{
    display:block; font-family:'Space Mono',monospace; font-size:11px; text-transform:uppercase;
    letter-spacing:0.06em; color:var(--green-sage); margin-bottom:6px; font-weight:500;
  }
  .field-group input{
    width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:3px;
    font-family:'Work Sans',sans-serif; font-size:14.5px; color:var(--ink); background:var(--paper);
  }
  .field-group input:focus{outline:2px solid var(--green-sage); outline-offset:1px;}
  .form-submit{
    width:100%; background:var(--green-deep); color:var(--white); border:none; padding:13px;
    border-radius:var(--radius); font-weight:600; font-size:14.5px; cursor:pointer;
  }
  .form-msg{margin-top:12px; font-size:13px; color:var(--green-sage); display:none;}
  .form-msg.show{display:block;}
</style>
</head>
<body>

<header class="appbar">
  <div class="appbar-inner">
    <a href="feed.html" class="logo">
      <svg class="logo-mark" viewBox="0 0 32 32" fill="none">
        <circle cx="16" cy="16" r="15" stroke="#1E3A2B" stroke-width="1.4"/>
        <path d="M16 6C16 6 10 12 10 18C10 21.3 12.7 24 16 24C19.3 24 22 21.3 22 18C22 12 16 6 16 6Z" fill="#6C8F53"/>
        <path d="M16 24V9" stroke="#F5F7F1" stroke-width="1" stroke-linecap="round"/>
      </svg>
      AgroValle
    </a>

    <div class="search-box">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="buscador" type="text" placeholder="Buscar productores, cultivos, servicios...">
    </div>

    <div class="appbar-actions">
      <button class="icon-btn" title="Notificaciones" type="button">
        <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
      </button>
      <button class="icon-btn" title="Chat" type="button">
        <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>
      </button>
      <div class="dropdown-wrap">
        <button class="profile-btn" id="btn-perfil" type="button">
          <span class="avatar" id="avatar-inicial">?</span>
          <span class="nombre" id="nombre-usuario">Cuenta</span>
        </button>
        <div class="dropdown-menu" id="menu-perfil">
          <button type="button" onclick="abrirModalPerfil()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            Editar mi perfil
          </button>
          <hr>
          <button type="button" class="salir" onclick="cerrarSesion()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Cerrar sesión
          </button>
        </div>
      </div>
    </div>
  </div>
</header>

<div class="app-layout">
  <div class="feed-col">
    <div class="feed-toolbar" id="feed-toolbar" style="display:none;">
      <button class="btn-primary" onclick="abrirModalPublicacion()" type="button">+ Publicar mi cosecha</button>
    </div>
    <div id="feed-lista">
      <div class="feed-placeholder">
        <div class="icon-wrap">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#6C8F53" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
        </div>
        <h2>Cargando publicaciones...</h2>
        <p>Ya volvemos con lo último del Valle de Uco.</p>
      </div>
    </div>
  </div>

  <aside class="ads-aside">
    <div class="ads-slot">
      <span class="eyebrow">Espacio publicitario</span>
      <p>Próximamente vas a poder destacar publicaciones acá.</p>
    </div>
  </aside>
</div>

<div class="modal-overlay" id="modal-publicacion">
  <div class="modal-card">
    <button class="modal-close" onclick="cerrarModalPublicacion()" type="button">✕</button>
    <span class="eyebrow">Nueva publicación</span>
    <h2 style="font-size:22px; margin-top:8px; margin-bottom:22px;">Publicá tu cosecha</h2>
    <form id="form-publicacion">
      <div class="field-group">
        <label for="pub-cultivo">Cultivo</label>
        <select id="pub-cultivo" required></select>
      </div>
      <div class="field-group" style="display:flex; gap:12px;">
        <div style="flex:1;">
          <label for="pub-cantidad">Cantidad</label>
          <input id="pub-cantidad" type="number" min="0" step="0.01" required>
        </div>
        <div style="flex:1;">
          <label for="pub-unidad">Unidad</label>
          <select id="pub-unidad">
            <option value="kg">kg</option>
            <option value="toneladas">toneladas</option>
            <option value="cajones">cajones</option>
          </select>
        </div>
      </div>
      <div class="field-group">
        <label for="pub-precio">Precio (ARS, opcional)</label>
        <input id="pub-precio" type="number" min="0" step="0.01">
      </div>
      <div class="field-group">
        <label for="pub-descripcion">Descripción</label>
        <textarea id="pub-descripcion" rows="3" style="width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:3px; font-family:'Work Sans',sans-serif; font-size:14.5px; color:var(--ink); background:var(--paper); resize:vertical;"></textarea>
      </div>
      <div class="field-group">
        <label for="pub-fotos">Fotos (podés elegir varias)</label>
        <input id="pub-fotos" type="file" accept="image/*" multiple>
      </div>
      <button class="form-submit" type="submit">Publicar</button>
      <p class="form-msg" id="pub-msg"></p>
    </form>
  </div>
</div>

<div class="modal-overlay" id="modal-perfil">
  <div class="modal-card">
    <button class="modal-close" onclick="cerrarModalPerfil()" type="button">✕</button>
    <span class="eyebrow">Tu perfil</span>
    <h2 id="perfil-saludo" style="font-size:22px; margin-top:8px; margin-bottom:22px;">Hola</h2>
    <div id="perfil-roles"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://yolccrvajsaltnfzvglr.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlvbGNjcnZhanNhbHRuZnp2Z2xyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwOTc1NzMsImV4cCI6MjA5OTY3MzU3M30.QydmDBnu-cc7B1hI1MjZ_eAyq_PcO2RHtFwEFKCQcbY';
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let usuarioActualId = null;

  async function protegerPagina(){
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session?.user){
      window.location.href = 'panel.html#cuenta';
      return;
    }
    usuarioActualId = session.user.id;
    await cargarDatosNav(session.user.id);
    await revisarSiEsProductor(session.user.id);
    await cargarFeed();
    await cargarOpcionesCultivo();
  }

  let esProductor = false;

  async function revisarSiEsProductor(userId){
    const { data: rolesData } = await supabaseClient
      .from('usuario_roles')
      .select('roles(nombre)')
      .eq('usuario_id', userId);
    const nombresRoles = (rolesData || []).map(r => r.roles?.nombre).filter(Boolean);
    esProductor = nombresRoles.includes('productor');
    document.getElementById('feed-toolbar').style.display = esProductor ? 'flex' : 'none';
  }

  // ======================================================
  // FEED: traer publicaciones activas con su cultivo, su
  // productor y sus fotos, y mostrarlas como tarjetas.
  // ======================================================
  function tiempoRelativo(fechaIso){
    const fecha = new Date(fechaIso);
    const diffMs = Date.now() - fecha.getTime();
    const diffDias = Math.floor(diffMs / (1000 * 60 * 60 * 24));
    if (diffDias <= 0) return 'hoy';
    if (diffDias === 1) return 'ayer';
    if (diffDias < 30) return `hace ${diffDias} días`;
    return fecha.toLocaleDateString('es-AR');
  }

  function formatearPrecio(precio, moneda){
    if (precio == null) return 'Precio a consultar';
    const num = Number(precio).toLocaleString('es-AR');
    return `${moneda || 'ARS'} ${num}`;
  }

  async function cargarFeed(){
    const contenedor = document.getElementById('feed-lista');
    const { data: publicaciones, error } = await supabaseClient
      .from('publicaciones')
      .select(`
        id, cantidad, unidad, precio, moneda, descripcion, creado_en,
        cultivos ( nombre ),
        productores ( nombre_finca, ubicacion_finca, usuarios ( nombre ) ),
        publicacion_imagenes ( url, orden )
      `)
      .eq('estado', 'activa')
      .order('creado_en', { ascending: false });

    if (error){
      contenedor.innerHTML = `<div class="feed-placeholder"><h2>No se pudo cargar el feed</h2><p>${error.message}</p></div>`;
      return;
    }

    if (!publicaciones || publicaciones.length === 0){
      contenedor.innerHTML = `
        <div class="feed-placeholder">
          <div class="icon-wrap">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#6C8F53" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
          </div>
          <h2>Todavía no hay publicaciones</h2>
          <p>Cuando los productores empiecen a publicar su cosecha, la vas a ver acá.</p>
        </div>`;
      return;
    }

    contenedor.innerHTML = '';
    publicaciones.forEach(pub => {
      contenedor.appendChild(renderTarjetaPublicacion(pub));
    });
  }

  function renderTarjetaPublicacion(pub){
    const card = document.createElement('article');
    card.className = 'post-card';

    const imagenes = (pub.publicacion_imagenes || []).slice().sort((a, b) => (a.orden || 0) - (b.orden || 0));
    if (imagenes.length > 0){
      const img = document.createElement('img');
      img.className = 'post-img';
      img.src = imagenes[0].url;
      img.alt = pub.cultivos?.nombre || 'Publicación';
      card.appendChild(img);
    }

    const body = document.createElement('div');
    body.className = 'post-body';

    const top = document.createElement('div');
    top.className = 'post-top';
    const cultivoTag = document.createElement('span');
    cultivoTag.className = 'post-cultivo';
    cultivoTag.textContent = pub.cultivos?.nombre || 'Producto';
    const fecha = document.createElement('span');
    fecha.className = 'post-fecha';
    fecha.textContent = tiempoRelativo(pub.creado_en);
    top.appendChild(cultivoTag);
    top.appendChild(fecha);
    body.appendChild(top);

    const detalle = document.createElement('p');
    detalle.className = 'post-detalle';
    detalle.innerHTML = `<strong>${pub.cantidad} ${pub.unidad}</strong> · ${formatearPrecio(pub.precio, pub.moneda)}`;
    body.appendChild(detalle);

    if (pub.descripcion){
      const desc = document.createElement('p');
      desc.className = 'post-desc';
      desc.textContent = pub.descripcion;
      body.appendChild(desc);
    }

    const finca = document.createElement('p');
    finca.className = 'post-finca';
    const nombreFinca = pub.productores?.nombre_finca || pub.productores?.usuarios?.nombre || 'Productor';
    const ubicacion = pub.productores?.ubicacion_finca;
    finca.textContent = ubicacion ? `${nombreFinca} · ${ubicacion}` : nombreFinca;
    body.appendChild(finca);

    card.appendChild(body);
    return card;
  }

  // ======================================================
  // BUSCADOR: filtra las tarjetas ya cargadas en pantalla
  // por cultivo, descripción, finca o ubicación.
  // ======================================================
  document.getElementById('buscador').addEventListener('input', (e) => {
    const texto = e.target.value.trim().toLowerCase();
    const tarjetas = document.querySelectorAll('#feed-lista .post-card');
    tarjetas.forEach(tarjeta => {
      const coincide = tarjeta.textContent.toLowerCase().includes(texto);
      tarjeta.style.display = coincide ? '' : 'none';
    });
  });

  // ======================================================
  // NUEVA PUBLICACIÓN (solo productores)
  // ======================================================
  async function cargarOpcionesCultivo(){
    const { data: cultivos } = await supabaseClient.from('cultivos').select('id, nombre').order('nombre');
    const select = document.getElementById('pub-cultivo');
    select.innerHTML = '';
    (cultivos || []).forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = c.nombre.charAt(0).toUpperCase() + c.nombre.slice(1);
      select.appendChild(opt);
    });
  }

  function abrirModalPublicacion(){
    document.getElementById('modal-publicacion').classList.add('open');
  }
  function cerrarModalPublicacion(){
    document.getElementById('modal-publicacion').classList.remove('open');
  }

  document.getElementById('form-publicacion').addEventListener('submit', async (e) => {
    e.preventDefault();
    const msg = document.getElementById('pub-msg');
    msg.classList.add('show');
    msg.textContent = 'Publicando...';

    const cultivoId = document.getElementById('pub-cultivo').value;
    const cantidad = document.getElementById('pub-cantidad').value;
    const unidad = document.getElementById('pub-unidad').value;
    const precioValor = document.getElementById('pub-precio').value;
    const descripcion = document.getElementById('pub-descripcion').value;
    const archivos = document.getElementById('pub-fotos').files;

    // 1. Crear la publicación
    const { data: nuevaPub, error: errorPub } = await supabaseClient
      .from('publicaciones')
      .insert({
        productor_id: usuarioActualId,
        cultivo_id: cultivoId,
        cantidad: Number(cantidad),
        unidad,
        precio: precioValor ? Number(precioValor) : null,
        descripcion
      })
      .select()
      .single();

    if (errorPub){
      msg.textContent = 'Error: ' + errorPub.message;
      return;
    }

    // 2. Subir cada foto al bucket y guardar su URL
    for (let i = 0; i < archivos.length; i++){
      const archivo = archivos[i];
      const ruta = `${usuarioActualId}/${nuevaPub.id}/${i}-${archivo.name}`;

      const { error: errorSubida } = await supabaseClient
        .storage
        .from('publicaciones-imagenes')
        .upload(ruta, archivo);

      if (errorSubida){
        msg.textContent = 'La publicación se creó, pero hubo un problema subiendo una foto: ' + errorSubida.message;
        continue;
      }

      const { data: urlData } = supabaseClient
        .storage
        .from('publicaciones-imagenes')
        .getPublicUrl(ruta);

      await supabaseClient.from('publicacion_imagenes').insert({
        publicacion_id: nuevaPub.id,
        url: urlData.publicUrl,
        orden: i
      });
    }

    msg.textContent = '¡Publicado!';
    document.getElementById('form-publicacion').reset();
    await cargarFeed();
    setTimeout(() => cerrarModalPublicacion(), 900);
  });

  async function cargarDatosNav(userId){
    const { data: usuario } = await supabaseClient
      .from('usuarios')
      .select('nombre')
      .eq('id', userId)
      .maybeSingle();

    const nombre = usuario?.nombre || '';
    document.getElementById('nombre-usuario').textContent = nombre || 'Cuenta';
    document.getElementById('avatar-inicial').textContent = nombre ? nombre.trim().charAt(0).toUpperCase() : '?';
    document.getElementById('perfil-saludo').textContent = nombre ? `Hola, ${nombre}` : 'Hola';
  }

  const btnPerfil = document.getElementById('btn-perfil');
  const menuPerfil = document.getElementById('menu-perfil');
  btnPerfil.addEventListener('click', (e) => {
    e.stopPropagation();
    menuPerfil.classList.toggle('open');
  });
  document.addEventListener('click', () => menuPerfil.classList.remove('open'));

  const CONFIG_ROLES = {
    productor: {
      tabla: 'productores',
      titulo: 'Productor',
      campos: [
        { id: 'nombre_finca', label: 'Nombre de la finca', tipo: 'text' },
        { id: 'hectareas', label: 'Hectáreas', tipo: 'number' },
        { id: 'ubicacion_finca', label: 'Ubicación de la finca', tipo: 'text' }
      ]
    },
    comprador: {
      tabla: 'compradores',
      titulo: 'Empresario / Comprador',
      campos: [
        { id: 'nombre_empresa', label: 'Nombre de la empresa', tipo: 'text' },
        { id: 'rubro', label: 'Rubro', tipo: 'text' },
        { id: 'volumen_mensual_estimado', label: 'Volumen mensual estimado', tipo: 'text' }
      ]
    },
    proveedor_servicio: {
      tabla: 'proveedores_servicios',
      titulo: 'Prestador de servicios',
      campos: [
        { id: 'nombre_empresa', label: 'Nombre de la empresa', tipo: 'text' },
        { id: 'tipo_servicio', label: 'Tipo de servicio', tipo: 'text' },
        { id: 'zona_cobertura', label: 'Zona de cobertura', tipo: 'text' }
      ]
    }
  };

  function renderTarjetaRol(rol, config, fila, userId){
    const form = document.createElement('form');
    form.className = 'form-card';

    const eyebrow = document.createElement('span');
    eyebrow.className = 'eyebrow';
    eyebrow.textContent = config.titulo;
    form.appendChild(eyebrow);

    const h3 = document.createElement('h3');
    h3.style.marginTop = '6px';
    h3.style.marginBottom = '16px';
    h3.style.fontSize = '16px';
    h3.textContent = 'Datos de tu perfil';
    form.appendChild(h3);

    const inputs = {};
    config.campos.forEach(campo => {
      const group = document.createElement('div');
      group.className = 'field-group';
      const label = document.createElement('label');
      label.textContent = campo.label;
      const input = document.createElement('input');
      input.type = campo.tipo;
      input.value = (fila && fila[campo.id] != null) ? fila[campo.id] : '';
      group.appendChild(label);
      group.appendChild(input);
      form.appendChild(group);
      inputs[campo.id] = input;
    });

    const btn = document.createElement('button');
    btn.className = 'form-submit';
    btn.type = 'submit';
    btn.textContent = 'Guardar cambios';
    form.appendChild(btn);

    const msg = document.createElement('p');
    msg.className = 'form-msg';
    form.appendChild(msg);

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const cambios = {};
      config.campos.forEach(campo => {
        const val = inputs[campo.id].value;
        cambios[campo.id] = (campo.tipo === 'number') ? (val ? Number(val) : null) : val;
      });
      msg.textContent = 'Guardando...';
      msg.classList.add('show');
      const { error } = await supabaseClient.from(config.tabla).update(cambios).eq('usuario_id', userId);
      msg.textContent = error ? ('Error: ' + error.message) : 'Cambios guardados.';
    });

    return form;
  }

  async function abrirModalPerfil(){
    menuPerfil.classList.remove('open');
    const contenedor = document.getElementById('perfil-roles');
    contenedor.innerHTML = '<p>Cargando...</p>';

    const { data: rolesData } = await supabaseClient
      .from('usuario_roles')
      .select('roles(nombre)')
      .eq('usuario_id', usuarioActualId);

    const nombresRoles = (rolesData || []).map(r => r.roles?.nombre).filter(Boolean);
    contenedor.innerHTML = '';

    for (const rol of nombresRoles){
      const config = CONFIG_ROLES[rol];
      if (!config) continue;
      const { data: fila } = await supabaseClient
        .from(config.tabla)
        .select('*')
        .eq('usuario_id', usuarioActualId)
        .maybeSingle();
      contenedor.appendChild(renderTarjetaRol(rol, config, fila, usuarioActualId));
    }

    if (nombresRoles.length === 0){
      contenedor.innerHTML = '<p>Todavía no tenés un rol asignado.</p>';
    }

    document.getElementById('modal-perfil').classList.add('open');
  }

  function cerrarModalPerfil(){
    document.getElementById('modal-perfil').classList.remove('open');
  }

  async function cerrarSesion(){
    await supabaseClient.auth.signOut();
    window.location.href = 'panel.html#cuenta';
  }

  protegerPagina();
</script>
